<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: white; color: #003f7d; margin: 0; padding: 20px; }
        
        /* Layout Containers */
        .container { max-width: 800px; margin: auto; text-align: center; }
        
        /* Buttons use your blue and green */
        button { 
            background-color: #00acec; color: white; border: none; 
            padding: 12px 24px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; font-size: 16px; transition: 0.3s;
            margin: 10px;
        }
        
        button:hover { background-color: #003f7d; transform: translateY(-2px); }
        
        .dept-card {
            border: 2px solid #a6cf1a; /* Your Lime Green */
            padding: 30px; margin: 20px 0; border-radius: 12px;
            background-color: #f9f9f9;
        }

        h2, h3 { color: #003f7d; border-bottom: 2px solid #00acec; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #003f7d; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1>Warehouse Portal</h1>

    <div id="login-section" class="dept-card">
        <p>Please sign in with your company Google account to continue.</p>
        <button onclick="login()">Login with Google</button>
    </div>

    <div id="department-selection" style="display:none;">
        <h2>Select Department</h2>
        <div class="dept-card">
            <button onclick="askForPin('chemistry')">Chemistry Department</button>
            <button onclick="askForPin('receiving')">Sample & Receiving</button>
        </div>
    </div>

    <div id="inventory-table" style="display:none;">
    <h3 id="dept-title" style="color: #003f7d; border-bottom: 3px solid #a6cf1a;"></h3>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search item names..." 
               style="padding: 10px; width: 80%; border: 1px solid #00acec; border-radius: 5px;">
    </div>

    <div style="text-align: right;">
      <button onclick="addNewItem()" style="background-color: #a6cf1a;">+ Add New Item</button>
  </div>

    <table>
        <thead>
            <tr style="background-color: #003f7d; color: white;">
                <th>Item Name</th>
                <th>Location</th>
                <th>Quantity</th>
                <th>Manage</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
    
    <br>
    <button onclick="backToProfiles()" style="background-color: #003f7d;">← Change Department</button>
</div>

<script type="module">
    import { doc, updateDoc, increment, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // WE MUST USE HTTPS LINKS FOR GITHUB PAGES
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_Qs2wlUjeptWIbe1EDQF_jFgSRKBj064",
    authDomain: "warehouse-f7584.firebaseapp.com",
    projectId: "warehouse-f7584",
    storageBucket: "warehouse-f7584.firebasestorage.app",
    messagingSenderId: "1775020901",
    appId: "1:1775020901:web:e8f44b6b6047d988d44f8c",
    measurementId: "G-2GQ2P8MTT1"
};

const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.login = async () => {
    try {
        // This line opens the popup and WAITS for the result
        const result = await signInWithPopup(auth, provider);
        
        // Now that we have the result, we clean up the email string
        const userEmail = result.user.email.toLowerCase().trim();

        if (userEmail === "tylercollinson8@gmail.com") {
            console.log("Access Granted!");
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('department-selection').style.display = 'block';
        } else {
            console.log("Access Denied for:", userEmail);
            alert("Access Restricted. Logged in as: " + userEmail);
            await auth.signOut(); // Logs them out so they can try a different account
        }
    } catch (error) {
        console.error("Login error:", error);
        alert("Login failed: " + error.message);
    }
};

window.adjustQty = async (itemId, amount) => {
    const itemRef = doc(db, "departments", window.currentDept, "inventory", itemId);
    try {
        await updateDoc(itemRef, {
            qty: increment(amount)
        });
        loadInventory(window.currentDept); // Live update the UI
    } catch (e) {
        alert("Update failed: " + e.message);
    }
};

window.addNewItem = async () => {
    // We use prompts for now because they are the easiest 'popups' to code
    const name = prompt("Enter Item Name (e.g., Hydrochloric Acid):");
    const loc = prompt("Enter Location (e.g., Shelf B-4):");
    const qtyInput = prompt("Enter Initial Quantity:");
    const qty = parseInt(qtyInput);

    if (name && loc && !isNaN(qty)) {
        try {
            await addDoc(collection(db, "departments", window.currentDept, "inventory"), {
                name: name,
                location: loc,
                qty: qty
            });
            loadInventory(window.currentDept); // Refresh the table automatically
        } catch (e) {
            alert("Error: Could not add item. Check your Firebase Rules.");
        }
    }
};

    window.askForPin = (dept) => {
        const pin = prompt("Enter PIN for " + dept);
        if (pin === "1234" || pin === "9999") { 
            document.getElementById('department-selection').style.display = 'none';
            document.getElementById('inventory-table').style.display = 'block';
            document.getElementById('dept-title').innerText = dept.toUpperCase() + " Inventory";
            loadInventory(dept);
        } else {
            alert("Invalid PIN");
        }
    };

    window.filterTable = () => {
    const input = document.getElementById("searchInput").value.toUpperCase();
    const tr = document.getElementById("table-body").getElementsByTagName("tr");

    for (let i = 0; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[0]; // Search by Name column
        if (td) {
            let txtValue = td.textContent || td.innerText;
            tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
};

    window.loadInventory = async (dept) => {
    window.currentDept = dept; // Store this globally to use in other functions
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "<tr><td colspan='4'>Loading inventory...</td></tr>";

    try {
        const querySnapshot = await getDocs(collection(db, "departments", dept, "inventory"));
        tbody.innerHTML = ""; 
        querySnapshot.forEach((documentSnapshot) => {
            const item = documentSnapshot.data();
            const itemId = documentSnapshot.id;
            const row = `<tr>
              <td>${item.name}</td>
              <td>${item.location}</td>
              <td style="text-align:center; font-weight:bold;">${item.qty}</td>
              <td>
                  <button onclick="adjustQty('${documentSnapshot.id}', 1)" style="background-color:#a6cf1a; padding:5px 10px; margin:2px;">+</button>
                  <button onclick="adjustQty('${documentSnapshot.id}', -1)" style="background-color:#ff4d4d; padding:5px 10px; margin:2px;">-</button>
              </td>
          </tr>`;
            tbody.innerHTML += row;
        });
    } catch (e) {
        console.error(e);
        tbody.innerHTML = "<tr><td colspan='4'>Error loading data. Check Permissions.</td></tr>";
    }
};

    window.backToProfiles = () => {
        document.getElementById('inventory-table').style.display = 'none';
        document.getElementById('department-selection').style.display = 'block';
    };
</script>
</body>
</html>
