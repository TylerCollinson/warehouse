<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/logo.png" type="image/x-icon">
    <title>Warehouse Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: white; color: #003f7d; margin: 0; padding: 20px; }
        
        /* Layout Containers */
        .container { max-width: auto; margin: auto; text-align: center; }

        /* FLEXBOX HEADER */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
            border-bottom: 3px solid #003f7d;
            margin-bottom: 30px;
            gap: 10px; /* Space between flex items */
        }

        .header-left, .header-center, .header-right {
            flex: 1; 
            display: flex;
            align-items: center;
        }

        .header-left { justify-content: flex-start; }
        .header-center { justify-content: center; flex: 2; } /* Center gets more space */
        .header-right { justify-content: flex-end; }

        .logo {
            height: 60px; /* Slightly smaller for mobile friendliness */
            width: auto;
        }

        .logo:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }

        h1 { margin: 0; font-size: 2rem; color: #003f7d; white-space: nowrap; }
        
        /* Buttons use your blue and green */
        button { 
            background-color: #00acec; color: white; border: none; 
            padding: 12px 24px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; font-size: 16px; transition: 0.3s;
            margin: 10px;
        }
        
        button:hover { background-color: #003f7d; transform: translateY(-2px); }

        /* Update the Department Selection container */
        .dept-grid {
            display: grid;
            /* This creates 2 columns on mobile, 3 on desktop */
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px 0;
        }

        .dept-grid button {
            margin: 0; /* Remove old margins */
            height: 100px; /* Make them big 'tiles' */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #003f7d; /* Dark blue for a 'pro' look */
            border: 2px solid #00acec;
            border-radius: 12px;
        }

        .dept-grid button:hover {
            background-color: #00acec;
            border-color: #a6cf1a;
        }

        
        .dept-card {
            border: 2px solid #a6cf1a; /* Your Lime Green */
            padding: 30px; margin: 20px 0; border-radius: 12px;
            background-color: #f9f9f9;
        }

        /* Add this to your style section */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        /* flag icon and manage cell */
        .flag-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-left: 8px;
        }
        .manage-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* flag icon and manage cell */

        @media (max-width: 768px) {
            #inventory-table table {
                display: block;
                overflow-x: auto; /* Makes table scrollable on phones */
                white-space: nowrap;
            }
        }

        h2, h3 { color: #003f7d; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #003f7d; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">
        <div class="header-left">
            <img src="./assets/logo.png" alt="Logo" class="logo" onclick="goHome()" style="cursor: pointer;">
        </div>
        <div class="header-center">
            <h1>Warehouse Portal</h1>
        </div>
        <div class="header-right">
            <button id="logout-btn" onclick="logout()" style="display:none; background-color: #ff4d4d; font-size: 14px; padding: 8px 16px;">Logout</button>
        </div>
    </header>

    <div id="login-section" class="dept-card">
        <p>Please sign in with your company Google account to continue.</p>
        <button onclick="login()">Login with Google</button>
    </div>

    <div id="department-selection" style="display:none;">
    <h2>Select Department</h2>
        <div class="dept-grid"></div>
            <div class="dept-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="askForPin('chemistry')">Chemistry</button>
                <button onclick="askForPin('prep')">Sample Prep</button>
                <button onclick="askForPin('micro')">Micro</button>
                <button onclick="askForPin('micro-misc')">Micro - Misc</button>
                <button onclick="askForPin('staples')">Staples</button>
                <button onclick="askForPin('allergen')">Allergen</button>
                <button onclick="askForPin('facilities')">Facilities</button>
                <button onclick="askForPin('safety')">Safety</button>
                <button onclick="askForPin('media')">Media</button>
                <button onclick="askForPin('masterclave')">Masterclave</button>
                <button onclick="askForPin('media-ith')">Media - ITH</button>
            </div>
        </div>  
</div>

    <div id="inventory-table" style="display:none;">
        <h3 id="dept-title" style="color: #003f7d; border-bottom: 3px solid #a6cf1a;"></h3>
        
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search item names..." 
                style="padding: 10px; flex: 1; min-width: 200px; border: 1px solid #00acec; border-radius: 5px;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="addNewItem()" style="background-color: #a6cf1a; margin: 0;">+ Add Item</button>
            </div>
        </div>

    <table>
        <thead>
            <tr style="background-color: #003f7d; color: white;">
                <th>Item</th>
                <th>JDE #</th>
                <th>Location</th>
                <th>Vendor</th>
                <th>Part #</th>
                <th>ROP</th>
                <th>Prev Week Order</th>
                <th>Qty</th>
                <th>Manage</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
    
    <br>
    <button onclick="backToProfiles()" style="background-color: #003f7d;">← Change Department</button>
</div>

    authDomain: "warehouse-f7584.firebaseapp.com",

    storageBucket: "warehouse-f7584.firebasestorage.app",
    messagingSenderId: "1775020901",

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    
    
    window.login = async () => {
    try {
        // This line opens the popup and WAITS for the result
        const result = await signInWithPopup(auth, provider);
        
        // Now that we have the result, we clean up the email string
        const userEmail = result.user.email.toLowerCase().trim();

        if (userEmail === "tylercollinson8@gmail.com") {
            console.log("Access Granted!");

        }
    } catch (error) {
        console.error("Login error:", error);

};

    window.logout = async () => {
        try {
            await signOut(auth);
            alert("Logged out successfully");
            // Reset the UI
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('inventory-table').style.display = 'none';
            document.getElementById('department-selection').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        } catch (error) {
            console.error("Logout error", error);
        }
    };

    window.goHome = () => {
    // Only allow going home if the user is actually logged in
    if (auth.currentUser) {
        document.getElementById('inventory-table').style.display = 'none';
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('department-selection').style.display = 'block';
        
        // Optional: Clear the search input when going back
        if(document.getElementById('searchInput')) {
            document.getElementById('searchInput').value = "";
        }
    } else {
        // If they aren't logged in, ensure they see the login screen
        document.getElementById('login-section').style.display = 'block';
    }
};

// Open the modal and fill it with current data
window.openEditModal = (id, item) => {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = item.name || '';
    document.getElementById('edit-jde').value = item.jde || '';
    document.getElementById('edit-loc').value = item.location || '';
    document.getElementById('edit-vendor').value = item.vendor || '';
    document.getElementById('edit-part').value = item.partNum || '';
    document.getElementById('edit-rop').value = item.rop || '';
    document.getElementById('edit-prev').value = item.prevOrder || '';
    document.getElementById('edit-qty').value = item.qty || 0;
    document.getElementById('editModal').style.display = 'flex';

    // Handle the Timestamp display
    const modText = document.getElementById('last-modified-text');
    if (item.lastUpdated) {
        // Firebase timestamps need to be converted to JS dates
        const date = item.lastUpdated.seconds ? new Date(item.lastUpdated.seconds * 1000) : new Date(item.lastUpdated);
        modText.innerText = "Last modified: " + date.toLocaleString();
    } else {
        modText.innerText = "Last modified: Never";
    }

    document.getElementById('editModal').style.display = 'flex';
};


window.closeModal = () => {
    document.getElementById('editModal').style.display = 'none';
};

window.saveEdit = async () => {
    const id = document.getElementById('edit-id').value;
    const itemRef = doc(db, "departments", window.currentDept, "inventory", id);
    
    const updatedData = {
        name: document.getElementById('edit-name').value,
        jde: document.getElementById('edit-jde').value,
        location: document.getElementById('edit-loc').value,
        vendor: document.getElementById('edit-vendor').value,
        partNum: document.getElementById('edit-part').value,
        rop: document.getElementById('edit-rop').value,
        prevOrder: document.getElementById('edit-prev').value,
        qty: parseInt(document.getElementById('edit-qty').value) || 0,
        lastUpdated: new Date() 
    };

    try {
        await updateDoc(itemRef, updatedData);
        closeModal();
        loadInventory(window.currentDept);
    } catch (e) {
        alert("Update failed: " + e.message);
    }
};

window.deleteCurrentItem = async () => {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('edit-name').value;
    if (confirm(`Permanently delete ${name}?`)) {
        try {
            await deleteDoc(doc(db, "departments", window.currentDept, "inventory", id));
            closeModal();
            loadInventory(window.currentDept);
        } catch (e) {
            alert("Delete failed.");
        }
    }
};

window.adjustQty = async (itemId, amount) => {
    const itemRef = doc(db, "departments", window.currentDept, "inventory", itemId);
    try {
        await updateDoc(itemRef, {
            qty: increment(amount)
        });
        loadInventory(window.currentDept); // Live update the UI
    } catch (e) {
        alert("Update failed: " + e.message);
    }
};

window.addNewItem = async () => {
    const name = prompt("Item Name:");
    const jde = prompt("JDE #:");
    const loc = prompt("Location:");
    const vendor = prompt("Vendor:");
    const partNum = prompt("Part Number:");
    const rop = prompt("ROP (Reorder Point):");
    const prevOrder = prompt("Prev Week Order:");
    const qty = parseInt(prompt("Current Quantity:"));

    if (name && !isNaN(qty)) {
        try {
            await addDoc(collection(db, "departments", window.currentDept, "inventory"), {
                name: name,
                jde: jde,
                location: loc,
                vendor: vendor,
                partNum: partNum,
                rop: rop,
                prevOrder: prevOrder,
                qty: qty,
                timestamp: new Date() // Good for tracking
            });
            loadInventory(window.currentDept);
        } catch (e) {
            alert("Error adding item: " + e.message);
        }
    }
};

    window.askForPin = (dept) => {
        const pin = prompt("Enter PIN for " + dept);
        if (pin === "1234" || pin === "9999") { 
            document.getElementById('department-selection').style.display = 'none';
            document.getElementById('inventory-table').style.display = 'block';
            document.getElementById('dept-title').innerText = dept.toUpperCase() + " Inventory";
            loadInventory(dept);
        } else {
            alert("Invalid PIN");
        }
    };

    window.filterTable = () => {
    const input = document.getElementById("searchInput").value.toUpperCase();
    const tr = document.getElementById("table-body").getElementsByTagName("tr");

    for (let i = 0; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[0]; // Search by Name column
        if (td) {
            let txtValue = td.textContent || td.innerText;
            tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
};

    window.loadInventory = async (dept) => {
    window.currentDept = dept; 
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "<tr><td colspan='9'>Loading Inventory...</td></tr>";

    try {
        const querySnapshot = await getDocs(collection(db, "departments", dept, "inventory"));
        tbody.innerHTML = ""; 

        if (querySnapshot.empty) {
            tbody.innerHTML = "<tr><td colspan='9'>No items found. Click '+ Add Item' to start.</td></tr>";
            return;
        }

        querySnapshot.forEach((docSnap) => {
    const item = docSnap.data();
    const itemId = docSnap.id;

    // ROP Calculation Logic
    const currentQty = parseInt(item.qty) || 0;
    const reorderPoint = parseInt(item.rop) || 0;
    const isLow = currentQty <= reorderPoint && reorderPoint > 0;

    // SVG Icons
    const redFlag = `<svg class="flag-icon" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6h-5.6z"/></svg>`;
    const blackFlag = `<svg class="flag-icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6h-5.6z"/></svg>`;

        const row = `<tr>
            <td style="font-weight: bold;">${item.name || '-'}</td>
            <td>${item.jde || '-'}</td>
            <td>${item.location || '-'}</td>
            <td>${item.vendor || '-'}</td>
            <td>${item.partNum || '-'}</td>
            <td>${item.rop || '-'}</td>
            <td>${item.prevOrder || '-'}</td>
            <td style="text-align:center; font-weight:bold; color: ${isLow ? '#ff4d4d' : 'inherit'};">${currentQty}</td>
            <td>
                <div class="manage-cell">
                    <button onclick='openEditModal("${itemId}", ${JSON.stringify(item).replace(/'/g, "&apos;")})' 
                            style="background-color:#003f7d; padding: 5px 12px; margin:0; font-size:12px;">Edit</button>
                    ${isLow ? redFlag : blackFlag}
                </div>
            </td>
        </tr>`;
        tbody.innerHTML += row;
    });
    } catch (e) {
        console.error("Fetch error:", e);
        tbody.innerHTML = "<tr><td colspan='9' style='color:red;'>Error loading data. Check Firestore Rules.</td></tr>";
    }
};

    window.backToProfiles = () => {
        document.getElementById('inventory-table').style.display = 'none';
        document.getElementById('department-selection').style.display = 'block';
    };

    // This runs automatically whenever the "Auth State" changes
    auth.onAuthStateChanged((user) => {
        if (user && user.email === "tylercollinson8@gmail.com") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('department-selection').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
        }
    });

<div id="editModal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.7); align-items:center; justify-content:center;">
    <div class="dept-card" style="background-color: white; width: 95%; max-width: 500px; text-align: left; max-height: 90vh; overflow-y: auto;">
        <h2 style="margin-top:0; border-bottom: 2px solid #00acec;">Modify Item</h2>
        <input type="hidden" id="edit-id">
        
        <label style="font-size: 12px; font-weight: bold;">Item Name</label>
        <input type="text" id="edit-name" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label style="font-size: 12px; font-weight: bold;">JDE #</label>
                <input type="text" id="edit-jde" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd;">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold;">Location</label>
                <input type="text" id="edit-loc" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label style="font-size: 12px; font-weight: bold;">Vendor</label>
                <input type="text" id="edit-vendor" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd;">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold;">Part #</label>
                <input type="text" id="edit-part" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label style="font-size: 12px; font-weight: bold;">ROP</label>
                <input type="text" id="edit-rop" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd;">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold;">Quantity</label>
                <input type="number" id="edit-qty" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #00acec; font-weight: bold;">
            </div>
        </div>

        <label style="font-size: 12px; font-weight: bold;">Prev Week Order</label>
        <input type="text" id="edit-prev" style="width:100%; padding:8px; margin-bottom:20px; border:1px solid #ddd;">
        
        <p id="last-modified-text" style="font-size: 11px; color: #666; margin-bottom: 15px; font-style: italic;"></p>

        <div style="display:flex; justify-content: space-between; align-items: center;">
            </div>

        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="deleteCurrentItem()" style="background-color: #ff4d4d; padding: 8px 15px; font-size: 12px;">Delete Item</button>
            <div style="display:flex; gap: 10px;">
                <button onclick="closeModal()" style="background-color: #999; padding: 8px 15px;">Cancel</button>
                <button onclick="saveEdit()" style="background-color: #a6cf1a; padding: 8px 15px;">Save</button>
            </div>
        </div>
    </div>
</div>
